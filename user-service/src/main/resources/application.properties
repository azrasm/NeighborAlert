spring.application.name=user-service
server.port=8081

# MySQL konekcija
# Dodali smo createDatabaseIfNotExist da budemo sigurni
spring.datasource.url=jdbc:mysql://localhost:3306/user_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
# Ako XAMPP ne radi sa praznom lozinkom, probaj upisati 'root' ili ostavi prazno
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate postavke
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Eksplicitno mu kažemo koji je MySQL u pitanju da ne mora sam pogađati
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
